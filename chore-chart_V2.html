<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="Chore Chart">
<title>⭐ Chore Chart</title>
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800;900&display=swap" rel="stylesheet">
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
  :root {
    --orange: #f97316;
    --orange2: #fb923c;
    --purple: #8b5cf6;
    --bg: #fdf6ee;
    --white: #ffffff;
    --text: #333;
    --muted: #888;
    --border: #e8e4f0;
  }
  body {
    font-family: 'Nunito', sans-serif;
    background: var(--bg);
    min-height: 100vh;
    max-width: 1400px;
    margin: 0 auto;
    padding-bottom: 80px;
    overscroll-behavior: none;
  }

  /* HEADER */
  .header {
    background: linear-gradient(135deg, var(--orange), var(--orange2));
    color: #fff;
    padding: 20px 20px 16px;
    display: flex;
    justify-content: space-between;
    align-items: center;
    box-shadow: 0 4px 12px rgba(249,115,22,0.3);
    position: sticky;
    top: 0;
    z-index: 50;
  }
  .header-title { font-size: 24px; font-weight: 900; letter-spacing: -0.5px; }
  .header-week { font-size: 12px; opacity: 0.85; font-weight: 600; }

  /* Side-by-side kid cards — always on wide screens, stacked on narrow */
  #kid-cards {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 16px;
    align-items: start;
  }
  .kid-card { margin-bottom: 0; }
  @media (max-width: 600px) {
    #kid-cards { grid-template-columns: 1fr; }
  }

  /* BOTTOM NAV */
  .nav {
    position: fixed;
    bottom: 0; left: 0; right: 0;
    background: var(--white);
    display: flex;
    box-shadow: 0 -2px 16px rgba(0,0,0,0.08);
    z-index: 100;
    max-width: 1400px;
    margin: 0 auto;
  }
  .nav-btn {
    flex: 1;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 10px 4px 14px;
    background: none;
    border: none;
    border-top: 3px solid transparent;
    cursor: pointer;
    font-family: inherit;
    color: var(--muted);
    font-size: 10px;
    font-weight: 700;
    gap: 3px;
    transition: color 0.15s;
  }
  .nav-btn.active { color: var(--orange); border-top-color: var(--orange); }
  .nav-icon { font-size: 22px; line-height: 1; }

  /* CONTENT */
  .content { padding: 16px 12px; display: none; }
  .content.active { display: block; }

  /* CARDS */
  .card {
    background: var(--white);
    border-radius: 20px;
    padding: 18px;
    box-shadow: 0 4px 16px rgba(0,0,0,0.06);
    margin-bottom: 16px;
  }
  .card-title { font-size: 15px; font-weight: 800; color: #555; margin-bottom: 14px; }
  .section-title { font-size: 22px; font-weight: 900; color: var(--text); margin-bottom: 12px; }

  /* KID CARD */
  .kid-card {
    background: var(--white);
    border-radius: 20px;
    border: 2px solid;
    padding: 18px;
    box-shadow: 0 4px 16px rgba(0,0,0,0.06);
    margin-bottom: 20px;
  }
  .kid-header { display: flex; align-items: center; gap: 12px; margin-bottom: 12px; }
  .kid-emoji { font-size: 36px; line-height: 1; }
  .kid-name { font-size: 22px; font-weight: 900; line-height: 1; }
  .kid-pts { font-size: 13px; color: var(--muted); font-weight: 600; margin-top: 2px; }
  .week-badge {
    margin-left: auto;
    padding: 6px 14px;
    border-radius: 20px;
    color: #fff;
    font-size: 12px;
    font-weight: 800;
    white-space: nowrap;
  }
  .progress-bg { background: #f0ece8; border-radius: 8px; height: 10px; margin-bottom: 16px; overflow: hidden; }
  .progress-fill { height: 100%; border-radius: 8px; transition: width 0.4s ease; }

  /* DAY GRID */
  .day-grid { display: flex; gap: 8px; overflow-x: auto; padding-bottom: 6px; -webkit-overflow-scrolling: touch; }
  .day-col { min-width: 86px; display: flex; flex-direction: column; gap: 6px; flex-shrink: 0; }
  .day-label { text-align: center; font-size: 10px; font-weight: 800; color: #aaa; text-transform: uppercase; letter-spacing: 1px; margin-bottom: 4px; }
  .chore-btn {
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 8px 4px;
    border-radius: 12px;
    border: 2px solid;
    font-size: 11px;
    font-weight: 700;
    cursor: pointer;
    position: relative;
    line-height: 1.3;
    gap: 2px;
    min-height: 64px;
    justify-content: center;
    font-family: inherit;
    transition: all 0.2s ease;
    background: #f8f7ff;
    color: #333;
  }
  .chore-btn.done { color: #fff; }
  .chore-btn.pop { transform: scale(1.15); }
  .chore-btn-name { font-size: 10px; text-align: center; }
  .chore-pts { font-size: 10px; opacity: 0.7; }
  .checkmark { position: absolute; top: 4px; right: 6px; font-size: 12px; font-weight: 900; }
  .empty-msg { color: #bbb; font-size: 14px; text-align: center; padding: 16px 0; font-weight: 600; }
  .empty-link { font-weight: 700; cursor: pointer; text-decoration: underline; }

  /* FORMS */
  .form-row { display: flex; align-items: center; gap: 10px; margin-bottom: 14px; flex-wrap: wrap; }
  .form-label { font-size: 13px; font-weight: 800; color: #888; width: 58px; flex-shrink: 0; }
  input[type="text"], input[type="number"] {
    padding: 9px 12px;
    border-radius: 10px;
    border: 2px solid var(--border);
    font-size: 15px;
    font-family: inherit;
    outline: none;
    flex: 1;
    min-width: 0;
    background: #fff;
    color: var(--text);
  }
  input[type="text"]:focus, input[type="number"]:focus { border-color: var(--orange); }
  .emoji-input { max-width: 70px; flex: none; text-align: center; }

  /* TOGGLE BUTTONS */
  .toggle-group { display: flex; gap: 8px; flex-wrap: wrap; }
  .toggle-btn {
    padding: 8px 14px;
    border-radius: 12px;
    border: none;
    font-size: 13px;
    font-weight: 800;
    cursor: pointer;
    font-family: inherit;
    background: #eee;
    color: #666;
    transition: all 0.15s;
  }
  .toggle-btn.active { color: #fff; }

  /* POINTS BUTTONS */
  .points-group { display: flex; gap: 8px; }
  .pts-btn {
    width: 44px; height: 36px;
    border-radius: 10px;
    border: none;
    font-size: 14px;
    font-weight: 800;
    cursor: pointer;
    font-family: inherit;
    background: #eee;
    color: #555;
    transition: all 0.15s;
  }
  .pts-btn.active { background: var(--orange); color: #fff; }

  /* DAY BUTTONS */
  .days-group { display: flex; gap: 6px; flex-wrap: wrap; }
  .day-btn {
    padding: 6px 11px;
    border-radius: 10px;
    border: none;
    font-size: 13px;
    font-weight: 800;
    cursor: pointer;
    font-family: inherit;
    background: #eee;
    color: #555;
    transition: all 0.15s;
  }
  .day-btn.active { background: #6366f1; color: #fff; }

  /* ADD BUTTON */
  .add-btn {
    width: 100%;
    padding: 14px;
    border-radius: 14px;
    border: none;
    background: linear-gradient(135deg, var(--orange), var(--orange2));
    color: #fff;
    font-size: 16px;
    font-weight: 900;
    cursor: pointer;
    margin-top: 4px;
    font-family: inherit;
    letter-spacing: 0.3px;
    transition: opacity 0.15s;
  }
  .add-btn:active { opacity: 0.85; }
  .add-btn:disabled { opacity: 0.4; cursor: not-allowed; }

  /* TEMPLATE GRID */
  .template-grid { display: flex; flex-wrap: wrap; gap: 8px; }
  .template-btn {
    padding: 7px 12px;
    border-radius: 12px;
    border: none;
    background: #f3f0fb;
    color: #555;
    font-size: 13px;
    font-weight: 700;
    cursor: pointer;
    font-family: inherit;
  }
  .template-btn:active { background: #e0d8f8; }

  /* CHORE ROWS */
  .chore-row { display: flex; align-items: center; gap: 12px; padding: 10px 0; border-bottom: 1px solid #f3ede6; }
  .chore-row:last-child { border-bottom: none; }
  .chore-row-emoji { font-size: 22px; }
  .chore-row-info { flex: 1; display: flex; flex-direction: column; }
  .chore-row-name { font-size: 15px; font-weight: 800; color: var(--text); }
  .chore-row-meta { font-size: 12px; color: #aaa; font-weight: 600; }
  .delete-btn {
    background: #fee2e2;
    border: none;
    color: #ef4444;
    border-radius: 8px;
    width: 32px; height: 32px;
    font-size: 14px;
    cursor: pointer;
    font-weight: 800;
    font-family: inherit;
    flex-shrink: 0;
  }

  /* REWARDS */
  .rewards-grid { display: flex; flex-wrap: wrap; gap: 12px; margin-top: 12px; }
  .reward-card {
    background: var(--bg);
    border-radius: 16px;
    padding: 16px 12px;
    width: calc(33.33% - 8px);
    min-width: 120px;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 6px;
    box-shadow: 0 2px 8px rgba(0,0,0,0.05);
    transition: opacity 0.2s;
  }
  .reward-card.locked { opacity: 0.45; }
  .reward-emoji { font-size: 32px; }
  .reward-name { font-size: 11px; font-weight: 800; text-align: center; color: #444; }
  .reward-cost { font-size: 14px; font-weight: 900; }
  .redeem-btn {
    padding: 7px 14px;
    border-radius: 10px;
    border: none;
    color: #fff;
    font-size: 12px;
    font-weight: 800;
    cursor: pointer;
    font-family: inherit;
    margin-top: 2px;
  }
  .redeem-btn:disabled { background: #ccc !important; cursor: not-allowed; }

  /* SETTINGS */
  .setting-row { display: flex; align-items: center; gap: 10px; margin-bottom: 12px; }
  .color-swatch { width: 28px; height: 28px; border-radius: 50%; flex-shrink: 0; }
  .reset-btn {
    padding: 10px 18px;
    border-radius: 12px;
    border: none;
    color: #fff;
    font-size: 14px;
    font-weight: 800;
    cursor: pointer;
    font-family: inherit;
    margin-right: 8px;
    margin-bottom: 8px;
  }

  /* TOAST */
  .toast {
    position: fixed;
    bottom: 96px;
    left: 50%;
    transform: translateX(-50%) translateY(20px);
    background: #1e1e1e;
    color: #fff;
    padding: 10px 20px;
    border-radius: 20px;
    font-size: 14px;
    font-weight: 700;
    opacity: 0;
    transition: all 0.3s ease;
    pointer-events: none;
    z-index: 200;
    white-space: nowrap;
  }
  .toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }
</style>
</head>
<body>

<div class="header">
  <div class="header-title">⭐ Chore Chart</div>
  <div class="header-week" id="weekLabel"></div>
</div>

<!-- THIS WEEK -->
<div class="content active" id="view-home">
  <div id="kid-cards"></div>
</div>

<!-- MANAGE CHORES -->
<div class="content" id="view-manage">
  <div class="section-title">Manage Chores</div>

  <div class="card">
    <div class="card-title">Quick Add from Templates</div>
    <div class="template-grid" id="template-grid"></div>
  </div>

  <div class="card">
    <div class="card-title">New Chore</div>
    <div class="form-row">
      <span class="form-label">For</span>
      <div class="toggle-group" id="kid-selector"></div>
    </div>
    <div class="form-row">
      <span class="form-label">Name</span>
      <input type="text" id="chore-name" placeholder="e.g. Feed the dogs">
    </div>
    <div class="form-row">
      <span class="form-label">Emoji</span>
      <input type="text" id="chore-emoji" class="emoji-input" value="⭐" maxlength="2">
    </div>
    <div class="form-row">
      <span class="form-label">Points</span>
      <div class="points-group" id="pts-selector"></div>
    </div>
    <div class="form-row">
      <span class="form-label">Type</span>
      <div class="toggle-group">
        <button class="toggle-btn active" id="type-recurring" style="background:#6366f1;color:#fff" onclick="setType('recurring')">🔁 Recurring</button>
        <button class="toggle-btn" id="type-once" onclick="setType('once')">1️⃣ One-time</button>
      </div>
    </div>
    <div class="form-row" id="days-row">
      <span class="form-label">Days</span>
      <div class="days-group" id="days-selector"></div>
    </div>
    <div class="form-row" id="onetime-row" style="display:none">
      <span class="form-label">Day</span>
      <div class="days-group" id="onetime-selector"></div>
    </div>
    <button class="add-btn" onclick="addChore()">＋ Add Chore</button>
  </div>

  <div id="existing-chores"></div>
</div>

<!-- REWARDS -->
<div class="content" id="view-rewards">
  <div class="section-title">Rewards Store 🏆</div>
  <div id="rewards-content"></div>
</div>

<!-- SETTINGS -->
<div class="content" id="view-settings">
  <div class="section-title">Settings ⚙️</div>
  <div class="card">
    <div class="card-title">Kid Names & Emojis</div>
    <div id="settings-kids"></div>
  </div>
  <div class="card">
    <div class="card-title">Reset Week (clears checkmarks, keeps points)</div>
    <button class="reset-btn" style="background:#f97316" onclick="resetWeek()">Clear This Week</button>
  </div>
  <div class="card">
    <div class="card-title">Reset Points</div>
    <div id="reset-points-btns"></div>
    <button class="reset-btn" style="background:#ef4444;margin-top:4px" onclick="resetEverything()">Reset Everything</button>
  </div>
</div>

<!-- BOTTOM NAV -->
<nav class="nav">
  <button class="nav-btn active" onclick="switchView('home', this)">
    <span class="nav-icon">📅</span>This Week
  </button>
  <button class="nav-btn" onclick="switchView('manage', this)">
    <span class="nav-icon">✏️</span>Chores
  </button>
  <button class="nav-btn" onclick="switchView('rewards', this)">
    <span class="nav-icon">🏆</span>Rewards
  </button>
  <button class="nav-btn" onclick="switchView('settings', this)">
    <span class="nav-icon">⚙️</span>Settings
  </button>
</nav>

<div class="toast" id="toast"></div>

<script>
const DAYS = ["Mon","Tue","Wed","Thu","Fri","Sat","Sun"];
const TEMPLATES = [
  {name:"Make bed",points:5,emoji:"🛏️"},
  {name:"Clear dishes",points:5,emoji:"🍽️"},
  {name:"Feed pets",points:10,emoji:"🐾"},
  {name:"Tidy room",points:10,emoji:"🧹"},
  {name:"Set table",points:5,emoji:"🥄"},
  {name:"Take out trash",points:15,emoji:"🗑️"},
  {name:"Vacuum",points:20,emoji:"🌀"},
  {name:"Laundry help",points:15,emoji:"👕"},
  {name:"Wipe counters",points:10,emoji:"🧽"},
  {name:"Water plants",points:5,emoji:"🌱"},
  {name:"Unload dishwasher",points:15,emoji:"✨"},
  {name:"Read 20 min",points:10,emoji:"📚"},
];
const REWARDS = [
  {name:"Extra screen time (30 min)",cost:50,emoji:"📱"},
  {name:"Choose dinner",cost:75,emoji:"🍕"},
  {name:"Stay up 30 min late",cost:100,emoji:"🌙"},
  {name:"Small treat",cost:40,emoji:"🍬"},
  {name:"Movie night pick",cost:120,emoji:"🎬"},
  {name:"Friend sleepover",cost:200,emoji:"🎉"},
];

// ── STATE ──────────────────────────────────────────────────────────────────
function load(key, fallback) {
  try { const v = localStorage.getItem(key); return v ? JSON.parse(v) : fallback; } catch { return fallback; }
}
function save(key, val) { localStorage.setItem(key, JSON.stringify(val)); }

let kids = load("cc-kids", [
  {id:"kid1", name:"Kid 1", color:"#f97316", emoji:"🌟", points:0},
  {id:"kid2", name:"Kid 2", color:"#8b5cf6", emoji:"🦄", points:0},
]);
let chores = load("cc-chores", []);
let completions = load("cc-completions", {});

// Draft state
let draftKidId = kids[0].id;
let draftPoints = 10;
let draftDays = [];
let draftType = "recurring";
let draftOneTimeDay = "Mon";

function getWeekKey() {
  const now = new Date();
  const mon = new Date(now);
  mon.setDate(now.getDate() - ((now.getDay() + 6) % 7));
  return mon.toISOString().slice(0,10);
}

// ── RENDER ────────────────────────────────────────────────────────────────
function render() {
  document.getElementById("weekLabel").textContent = "Week of " + getWeekKey();
  renderHome();
  renderManage();
  renderRewards();
  renderSettings();
}

function weeklyPoints(kidId) {
  return chores.filter(c => c.kidId === kidId).reduce((sum, c) => {
    const days = c.type === "once" ? [c.oneTimeDay] : (c.days || []);
    return sum + days.filter(d => completions[`${c.id}-${d}`]).length * c.points;
  }, 0);
}

function renderHome() {
  const el = document.getElementById("kid-cards");
  el.innerHTML = kids.map(kid => {
    const myChores = chores.filter(c => c.kidId === kid.id);
    const wp = weeklyPoints(kid.id);
    const max = myChores.reduce((s,c) => {
      const days = c.type === "once" ? [c.oneTimeDay] : (c.days||[]);
      return s + days.length * c.points;
    }, 0);
    const pct = max > 0 ? Math.min(1, wp / max) * 100 : 0;

    const daysCols = DAYS.map(day => {
      const dc = myChores.filter(c => c.type === "once" ? c.oneTimeDay === day : (c.days||[]).includes(day));
      if (!dc.length) return "";
      const btns = dc.map(chore => {
        const key = `${chore.id}-${day}`;
        const done = !!completions[key];
        return `<button class="chore-btn${done?" done":""}" 
          style="border-color:${kid.color};${done?`background:${kid.color}`:'background:#f8f7ff'}"
          onclick="toggleChore('${chore.id}','${day}')">
          <span>${chore.emoji}</span>
          <span class="chore-btn-name">${chore.name}</span>
          <span class="chore-pts">+${chore.points}</span>
          ${done?'<span class="checkmark">✓</span>':''}
        </button>`;
      }).join("");
      return `<div class="day-col"><div class="day-label">${day}</div>${btns}</div>`;
    }).join("");

    const emptyMsg = myChores.length === 0
      ? `<div class="empty-msg">No chores yet! <span class="empty-link" style="color:${kid.color}" onclick="goToManage('${kid.id}')">Add some →</span></div>`
      : "";

    return `<div class="kid-card" style="border-color:${kid.color}">
      <div class="kid-header">
        <span class="kid-emoji">${kid.emoji}</span>
        <div>
          <div class="kid-name" style="color:${kid.color}">${kid.name}</div>
          <div class="kid-pts">⭐ ${kid.points} total pts</div>
        </div>
        <div class="week-badge" style="background:${kid.color}">${wp} / ${max} pts this week</div>
      </div>
      <div class="progress-bg"><div class="progress-fill" style="width:${pct}%;background:${kid.color}"></div></div>
      <div class="day-grid">${daysCols}</div>
      ${emptyMsg}
    </div>`;
  }).join("");
}

function renderManage() {
  // Template grid
  document.getElementById("template-grid").innerHTML = TEMPLATES.map(t =>
    `<button class="template-btn" onclick="applyTemplate('${t.name}','${t.emoji}',${t.points})">${t.emoji} ${t.name}</button>`
  ).join("");

  // Kid selector
  document.getElementById("kid-selector").innerHTML = kids.map(k =>
    `<button class="toggle-btn${draftKidId===k.id?" active":""}" 
      style="${draftKidId===k.id?`background:${k.color};color:#fff`:''}"
      onclick="selectKid('${k.id}')">${k.emoji} ${k.name}</button>`
  ).join("");

  // Points selector
  document.getElementById("pts-selector").innerHTML = [5,10,15,20,25].map(p =>
    `<button class="pts-btn${draftPoints===p?" active":""}" onclick="selectPts(${p})">${p}</button>`
  ).join("");

  // Days selectors
  document.getElementById("days-selector").innerHTML = DAYS.map(d =>
    `<button class="day-btn${draftDays.includes(d)?" active":""}" onclick="toggleDay('${d}')">${d}</button>`
  ).join("");
  document.getElementById("onetime-selector").innerHTML = DAYS.map(d =>
    `<button class="day-btn${draftOneTimeDay===d?" active":""}" onclick="setOneTimeDay('${d}')">${d}</button>`
  ).join("");

  // Existing chores per kid
  document.getElementById("existing-chores").innerHTML = kids.map(kid => {
    const kc = chores.filter(c => c.kidId === kid.id);
    const rows = kc.length === 0
      ? `<div class="empty-msg">No chores yet</div>`
      : kc.map(c => `<div class="chore-row">
          <span class="chore-row-emoji">${c.emoji}</span>
          <div class="chore-row-info">
            <span class="chore-row-name">${c.name}</span>
            <span class="chore-row-meta">${c.points} pts · ${c.type==="once"?`One-time (${c.oneTimeDay})`:(c.days||[]).join(", ")}</span>
          </div>
          <button class="delete-btn" onclick="removeChore('${c.id}')">✕</button>
        </div>`).join("");
    return `<div class="card">
      <div class="card-title" style="color:${kid.color}">${kid.emoji} ${kid.name}'s Chores</div>
      ${rows}
    </div>`;
  }).join("");
}

function renderRewards() {
  document.getElementById("rewards-content").innerHTML = kids.map(kid => {
    const cards = REWARDS.map(r => {
      const can = kid.points >= r.cost;
      return `<div class="reward-card${can?"":" locked"}">
        <div class="reward-emoji">${r.emoji}</div>
        <div class="reward-name">${r.name}</div>
        <div class="reward-cost" style="color:${kid.color}">⭐ ${r.cost}</div>
        <button class="redeem-btn" style="background:${can?kid.color:'#ccc'}" 
          ${can?"":""} onclick="redeemReward('${kid.id}',${r.cost},'${r.name}')">Redeem</button>
      </div>`;
    }).join("");
    return `<div class="card" style="border-top:4px solid ${kid.color}">
      <div class="kid-header">
        <span class="kid-emoji">${kid.emoji}</span>
        <div class="kid-name" style="color:${kid.color}">${kid.name}</div>
        <div class="week-badge" style="background:${kid.color}">⭐ ${kid.points} pts</div>
      </div>
      <div class="rewards-grid">${cards}</div>
    </div>`;
  }).join("");
}

function renderSettings() {
  document.getElementById("settings-kids").innerHTML = kids.map(kid =>
    `<div class="setting-row">
      <input type="text" class="emoji-input" value="${kid.emoji}" maxlength="2"
        onchange="updateKid('${kid.id}','emoji',this.value)">
      <input type="text" value="${kid.name}"
        onchange="updateKid('${kid.id}','name',this.value)">
      <div class="color-swatch" style="background:${kid.color}"></div>
    </div>`
  ).join("");

  document.getElementById("reset-points-btns").innerHTML = kids.map(kid =>
    `<button class="reset-btn" style="background:${kid.color}" onclick="resetKidPoints('${kid.id}')">Reset ${kid.name}</button>`
  ).join("");
}

// ── ACTIONS ────────────────────────────────────────────────────────────────
function toggleChore(choreId, day) {
  const key = `${choreId}-${day}`;
  const was = !!completions[key];
  completions[key] = !was;
  save("cc-completions", completions);
  const chore = chores.find(c => c.id === choreId);
  if (chore) {
    kids = kids.map(k => k.id === chore.kidId
      ? {...k, points: k.points + (was ? -chore.points : chore.points)}
      : k);
    save("cc-kids", kids);
    if (!was) showToast(`${chore.emoji} +${chore.points} pts!`);
  }
  renderHome();
  renderRewards();
}

function addChore() {
  const name = document.getElementById("chore-name").value.trim();
  const emoji = document.getElementById("chore-emoji").value.trim() || "⭐";
  if (!name) { showToast("Please enter a chore name"); return; }
  if (draftType === "recurring" && draftDays.length === 0) { showToast("Pick at least one day"); return; }
  const chore = {
    id: Date.now().toString(),
    kidId: draftKidId,
    name, emoji,
    points: draftPoints,
    type: draftType,
    days: draftType === "recurring" ? [...draftDays] : [],
    oneTimeDay: draftOneTimeDay,
  };
  chores.push(chore);
  save("cc-chores", chores);
  document.getElementById("chore-name").value = "";
  document.getElementById("chore-emoji").value = "⭐";
  draftDays = [];
  draftPoints = 10;
  render();
  showToast("Chore added! ✓");
}

function removeChore(id) {
  chores = chores.filter(c => c.id !== id);
  // clean up completions
  Object.keys(completions).forEach(k => { if (k.startsWith(id+"-")) delete completions[k]; });
  save("cc-chores", chores);
  save("cc-completions", completions);
  render();
}

function redeemReward(kidId, cost, name) {
  const kid = kids.find(k => k.id === kidId);
  if (!kid || kid.points < cost) return;
  kids = kids.map(k => k.id === kidId ? {...k, points: k.points - cost} : k);
  save("cc-kids", kids);
  showToast(`🎉 Redeemed: ${name}!`);
  renderHome();
  renderRewards();
  renderSettings();
}

function updateKid(id, field, val) {
  kids = kids.map(k => k.id === id ? {...k, [field]: val} : k);
  save("cc-kids", kids);
  render();
}

function resetWeek() {
  completions = {};
  save("cc-completions", completions);
  renderHome();
  showToast("Week cleared! 🗓️");
}

function resetKidPoints(kidId) {
  kids = kids.map(k => k.id === kidId ? {...k, points: 0} : k);
  save("cc-kids", kids);
  renderHome(); renderRewards(); renderSettings();
  showToast("Points reset");
}

function resetEverything() {
  completions = {};
  kids = kids.map(k => ({...k, points: 0}));
  save("cc-completions", completions);
  save("cc-kids", kids);
  render();
  showToast("Everything reset");
}

// ── DRAFT HELPERS ──────────────────────────────────────────────────────────
function selectKid(id) { draftKidId = id; renderManage(); }
function selectPts(p) { draftPoints = p; renderManage(); }
function toggleDay(d) {
  draftDays = draftDays.includes(d) ? draftDays.filter(x=>x!==d) : [...draftDays, d];
  renderManage();
}
function setOneTimeDay(d) { draftOneTimeDay = d; renderManage(); }
function setType(t) {
  draftType = t;
  document.getElementById("days-row").style.display = t === "recurring" ? "flex" : "none";
  document.getElementById("onetime-row").style.display = t === "once" ? "flex" : "none";
  document.getElementById("type-recurring").className = "toggle-btn" + (t==="recurring"?" active":"");
  document.getElementById("type-recurring").style.cssText = t==="recurring" ? "background:#6366f1;color:#fff" : "";
  document.getElementById("type-once").className = "toggle-btn" + (t==="once"?" active":"");
  document.getElementById("type-once").style.cssText = t==="once" ? "background:#6366f1;color:#fff" : "";
  renderManage();
}
function applyTemplate(name, emoji, points) {
  document.getElementById("chore-name").value = name;
  document.getElementById("chore-emoji").value = emoji;
  draftPoints = points;
  renderManage();
}
function goToManage(kidId) {
  draftKidId = kidId;
  switchView("manage", document.querySelectorAll(".nav-btn")[1]);
}

// ── NAV ───────────────────────────────────────────────────────────────────
function switchView(name, btn) {
  document.querySelectorAll(".content").forEach(el => el.classList.remove("active"));
  document.querySelectorAll(".nav-btn").forEach(el => el.classList.remove("active"));
  document.getElementById("view-" + name).classList.add("active");
  btn.classList.add("active");
  if (name === "manage") renderManage();
}

// ── TOAST ─────────────────────────────────────────────────────────────────
let toastTimer;
function showToast(msg) {
  const t = document.getElementById("toast");
  t.textContent = msg;
  t.classList.add("show");
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => t.classList.remove("show"), 2000);
}

// Init
render();
</script>
</body>
</html>
